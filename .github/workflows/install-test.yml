name: Install Test

on:
  release:
    types: [published]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC

jobs:
  js-install-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]

    steps:
      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install @trikhub/cli
        run: npm install -g @trikhub/cli

      - name: Verify CLI runs
        run: trik --help

      - name: Scaffold agent project
        run: trik create-agent --yes ts

      - name: Verify scaffolded files
        run: |
          test -f my-agent/package.json
          test -f my-agent/src/agent.ts
          test -f my-agent/.trikhub/config.json

      - name: Install a trik
        run: cd my-agent && trik install @molefas/trik-demo-notes

  python-install-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12']

    steps:
      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install trikhub
        run: pip install trikhub

      - name: Verify CLI runs
        run: trik --help

      - name: Scaffold agent project
        run: trik create-agent --yes py

      - name: Verify scaffolded files
        run: |
          test -f my-agent/pyproject.toml
          test -f my-agent/agent.py
          test -f my-agent/.trikhub/config.json

      - name: Install a trik
        run: cd my-agent && trik install @molefas/trik-demo-notes-py

      - name: Verify agent loads trik
        run: |
          cd my-agent
          python -c "
          import asyncio
          from trikhub.gateway import TrikGateway

          async def check():
              gw = TrikGateway()
              await gw.initialize()
              await gw.load_triks_from_config()
              triks = gw.get_loaded_triks()
              assert len(triks) > 0, 'No triks loaded'
              print(f'Gateway loaded {len(triks)} trik(s)')

          asyncio.run(check())
          "
