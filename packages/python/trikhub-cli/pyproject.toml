[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trikhub-cli"
version = "0.1.0"
description = "TrikHub CLI - scaffold, install, and publish triks"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "TrikHub Team", email = "team@trikhub.com"}]
keywords = ["trikhub", "cli", "trik", "agent", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "trikhub-manifest>=0.1.0",
    "click>=8.0.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "pytest-asyncio>=0.21.0", "ruff>=0.1.0"]

[project.scripts]
trik = "trikhub.cli.main:cli"

[project.urls]
Homepage = "https://trikhub.com"
Repository = "https://github.com/Molefas/trikhub/tree/main/packages/python/trikhub-cli"

[tool.setuptools.packages.find]
where = ["src"]
include = ["trikhub*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
