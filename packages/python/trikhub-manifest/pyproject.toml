[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trikhub-manifest"
version = "0.1.0"
description = "TrikHub v2 manifest types and validation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    {name = "TrikHub Team", email = "team@trikhub.com"}
]
keywords = ["ai", "agents", "skills", "llm", "manifest"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "pydantic>=2.0.0",
    "jsonschema>=4.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://trikhub.com"
Repository = "https://github.com/Molefas/trikhub/tree/main/packages/python/trikhub-manifest"

[tool.setuptools.packages.find]
where = ["src"]
include = ["trikhub*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
