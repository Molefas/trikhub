[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "trikhub-langchain"
version = "0.1.0"
description = "TrikHub LangChain/LangGraph adapter — enhance() wraps agents with handoff routing"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "trikhub-gateway>=0.1.0",
    "langchain-core>=0.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["trikhub.*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
