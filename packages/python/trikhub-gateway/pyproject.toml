[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "trikhub-gateway"
version = "0.1.0"
description = "TrikHub Python gateway — loads and routes triks with handoff session management"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "trikhub-manifest>=0.1.0",
    "trikhub-sdk>=0.1.0",
    "trikhub-worker>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["trikhub.*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
